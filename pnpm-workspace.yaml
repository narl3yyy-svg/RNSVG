packages:
    - "."

nodeLinker: hoisted
verifyStoreIntegrity: true
strictPeerDependencies: false

minimumReleaseAge: 7d
minimumReleaseAgeStrict: false
blockExoticSubDeps: true

allowBuilds:
    electron: true
    electron-winstaller: true
    esbuild: true

overrides:
    "@electron/get": "3.1.0"
    ajv: ">=6.14.0"
    ansi-regex: ">=6.0.1"
    strip-ansi: "6.0.1"
    "strip-ansi>ansi-regex": "5.0.1"
    braces: ">=3.0.3"
    brace-expansion: ">=1.1.13"
    browserslist: ">=4.16.5"
    cross-spawn: ">=7.0.5"
    debug: ">=4.3.1"
    dompurify: ">=3.4.11"
    form-data: ">=4.0.6"
    socks: ">=2.8.0"
    ejs: ">=3.1.10"
    glob: ">=10.5.0"
    "@electron/asar>glob": "7.2.3"
    "minimatch@3.1.4>brace-expansion": "1.1.12"
    got: ">=11.8.6"
    hosted-git-info: ">=2.8.9"
    http-cache-semantics: ">=4.1.1"
    ini: ">=1.3.6"
    js-yaml: ">=4.2.0"
    lodash: ">=4.17.24"
    micromatch: ">=4.0.8"
    minimatch: ">=10.2.3"
    "@electron/asar>minimatch": "3.1.4"
    ms: ">=2.0.0"
    picomatch: ">=4.0.4"
    plist: ">=3.0.5"
    protocol-buffers-schema: ">=3.6.1"
    semver: ">=7.5.2"
    serialize-javascript: ">=7.0.3"
    flatted: ">=3.4.2"
    tar: ">=7.5.16"
    tmp: ">=0.2.7"
    undici: ">=7.28.0"
    webpack: ">=5.104.0"
    y18n: ">=5.0.5"
    yargs-parser: ">=18.1.1"
    "@isaacs/brace-expansion": ">=5.0.1"
    "@tootallnate/once": ">=3.0.1"

patchedDependencies:
    ol@10.9.0: patches/ol@10.9.0.patch
    ol-mapbox-style@13.4.1: patches/ol-mapbox-style@13.4.1.patch

peerDependencyRules:
    allowedVersions:
        vis-data>uuid: ">=14.0.0"
        vis-network>uuid: ">=14.0.0"
