# Install Node, activate pnpm via corepack, then restore setup-node's pnpm cache.
# setup-node with cache: pnpm requires pnpm on PATH during that step (see setup-node docs).
name: Setup Node.js and pnpm
description: Node.js, corepack-managed pnpm, and pnpm store cache

inputs:
    node-version:
        description: Node.js version
        required: true
    pnpm-version:
        description: pnpm version activated through corepack
        required: false
        default: "11.1.2"
    cache-dependency-path:
        description: Lockfile path used for the pnpm cache key
        required: false
        default: pnpm-lock.yaml

runs:
    using: composite
    steps:
        - name: Set up Node.js
          uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
          with:
              node-version: ${{ inputs.node-version }}

        - name: Enable pnpm (corepack)
          shell: bash
          run: corepack enable && corepack prepare "pnpm@${{ inputs.pnpm-version }}" --activate

        - name: Verify Node.js version
          shell: bash
          run: |
              set -euo pipefail
              node -v
              pnpm -v
              node -e "const major=Number(process.versions.node.split('.')[0]); if(major<24) process.exit(1)"

        - name: Cache pnpm dependencies
          uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm
              cache-dependency-path: ${{ inputs.cache-dependency-path }}
